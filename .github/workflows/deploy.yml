name: Deploy to GitHub Pages

on:
  # Automatisch bij elke push naar main
  push:
    branches: [main]
  # Handmatig starten vanuit de Actions-tab
  workflow_dispatch:

# Nodig voor GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Voorkomt dat twee deploys tegelijk draaien
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Geen cache: npm cache kan oude artifacts meedragen tussen runs.
          # Door dit uit te zetten wordt alles vanaf nul gebouwd.

      - name: Install dependencies
        # npm install (niet npm ci) — tolereert een onvolledige package-lock.json.
        run: npm install

      - name: Nuke all caches
        # Forceer een echte verse build. Vite, Rollup en esbuild kunnen allemaal
        # cachen op manieren die intermediate bundle-resultaten behouden.
        run: |
          rm -rf node_modules/.vite
          rm -rf node_modules/.cache
          rm -rf dist
          rm -rf .vite
          echo "All caches cleaned at $(date)"
          echo ""
          echo "=== FILES IN src/ ON LINUX RUNNER ==="
          ls -la src/
          echo ""
          echo "=== ALL JSX FILES (case-sensitive search) ==="
          find . -name "*.jsx" -not -path "./node_modules/*" | sort
          echo ""
          echo "=== App.jsx size and first/last line ==="
          wc -l src/App.jsx || echo "NOT FOUND: src/App.jsx"
          echo ""
          echo "=== main.jsx import line ==="
          grep -n "App" src/main.jsx || echo "NOT FOUND"
          echo ""
          echo "=== Does src/App.jsx contain the fix? ==="
          grep -c "lambert72ToWgs84" src/App.jsx || echo "0 matches"
          grep -c "allInside" src/App.jsx || echo "0 matches"

      - name: Build
        run: npm run build

      - name: Verify bundle contents
        # Controleer of de marker daadwerkelijk in de gebundelde output zit.
        # Als deze stap faalt, weten we zeker dat Vite de source-code niet correct inleest.
        run: |
          echo "=== BUNDLE FILES ==="
          ls -la dist/assets/
          echo ""
          echo "=== MARKER CHECK IN BUNDLE ==="
          if grep -r "ZONNEDAK_FIX_MARKER" dist/assets/; then
            echo "✅ Marker gevonden in bundle"
          else
            echo "❌ Marker NIET in bundle — Vite bundelt App.jsx niet correct"
          fi
          echo ""
          echo "=== LAMBERT72 CHECK IN BUNDLE ==="
          if grep -r "lambert72ToWgs84\|allInside" dist/assets/ > /dev/null; then
            echo "✅ Fix-code gevonden in bundle"
          else
            echo "❌ Fix-code NIET in bundle"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite bouwt standaard naar de dist/ map
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
