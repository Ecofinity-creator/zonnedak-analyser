name: Deploy to GitHub Pages

on:
  # Automatisch bij elke push naar main
  push:
    branches: [main]
  # Handmatig starten vanuit de Actions-tab
  workflow_dispatch:

# Nodig voor GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Voorkomt dat twee deploys tegelijk draaien
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Geen cache: npm cache kan oude artifacts meedragen tussen runs.

      - name: Install dependencies
        # npm install (niet npm ci) — tolereert onvolledige package-lock.json.
        run: npm install

      - name: Nuke all caches
        # Forceer een echte verse build. Vite, Rollup en esbuild kunnen allemaal
        # cachen op manieren die intermediate bundle-resultaten behouden.
        run: |
          rm -rf node_modules/.vite
          rm -rf node_modules/.cache
          rm -rf dist
          rm -rf .vite
          echo "Caches cleaned at $(date)"

      - name: Run unit tests
        # Regressievangnet voor BUG-09, BUG-10, BUG-11 in panelPlacement.js
        # Build/deploy wordt GEBLOKKEERD als ook maar één test faalt.
        # Dit voorkomt dat regressies in de paneel-plaatsing in productie belanden.
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify bundle contents
        # Sanity check: de gebundelde output moet de module code bevatten.
        run: |
          echo "=== BUNDLE FILES ==="
          ls -la dist/assets/
          echo ""
          echo "=== FIX-CODE CHECK IN BUNDLE ==="
          if grep -r "lambert72ToWgs84\|detectRidgeAzimuth" dist/assets/ > /dev/null; then
            echo "✅ panelPlacement module in bundle"
          else
            echo "❌ panelPlacement module NIET in bundle — build/import kapot"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite bouwt standaard naar de dist/ map
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
