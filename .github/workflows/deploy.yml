name: Deploy to GitHub Pages

on:
  # Automatisch bij elke push naar main
  push:
    branches: [main]
  # Handmatig starten vanuit de Actions-tab
  workflow_dispatch:

# Nodig voor GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Voorkomt dat twee deploys tegelijk draaien
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm install (niet npm ci) — tolereert een onvolledige package-lock.json.
        # De huidige lockfile mist platform-specifieke Rollup binaries (bekend npm issue),
        # waardoor npm ci faalt. npm install regenereert de ontbrekende entries on-the-fly.
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite bouwt standaard naar de dist/ map
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
